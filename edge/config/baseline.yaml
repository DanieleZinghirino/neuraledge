  - id: sq_1
    type: square_wave
    sampling_rate: 5.0
    signal:
      model: square_wave
      params:
        period: 10.0
        duty_cycle: 0.50
    noise:
      model: uniform
      params:
        amplitude: 0.01
    fault:
      model: none
      params: {}

  - id: sq_2
    type: square_wave
    sampling_rate: 10.0
    signal:
      model: square_wave
      params:
        period: 18.0
        duty_cycle: 0.40
    noise:
      model: gaussian
      params:
        sigma: 0.015
    fault:
      model: none
      params: {}

  - id: sq_3
    type: square_wave
    sampling_rate: 20.0
    signal:
      model: square_wave
      params:
        period: 6.0
        duty_cycle: 0.70
    noise:
      model: impulse
      params:
        probability: 0.003
        impulse_sigma: 0.03
    fault:
      model: none
      params: {}

  - id: ramp_1
    type: ramp
    sampling_rate: 2.0
    signal:
      model: ramp
      params:
        period: 20.0
        low: 0.0
        high: 40.0
    noise:
      model: gaussian
      params:
        sigma: 0.05
    fault:
      model: none
      params: {}

  - id: ramp_2
    type: ramp
    sampling_rate: 5.0
    signal:
      model: ramp
      params:
        period: 30.0
        low: 10.0
        high: 70.0
    noise:
      model: drift
      params:
        step_sigma: 0.002
        max_drift: 0.3
    fault:
      model: none
      params: {}

  - id: ramp_3
    type: ramp
    sampling_rate: 10.0
    signal:
      model: ramp
      params:
        period: 12.0
        low: 5.0
        high: 90.0
    noise:
      model: periodic
      params:
        amplitude: 0.03
        frequency: 50.0
        phase: 0.2
