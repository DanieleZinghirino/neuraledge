  - id: step_1
    type: step_response
    sampling_rate: 2.0
    signal:
      model: step_response
      params:
        high: 60.0
        low: 20.0
        tau: 3.0
        period: 20.0
    noise:
      model: gaussian
      params:
        sigma: 0.08
    fault:
      model: none
      params: {}

  - id: step_2
    type: step_response
    sampling_rate: 5.0
    signal:
      model: step_response
      params:
        high: 85.0
        low: 30.0
        tau: 5.0
        period: 25.0
    noise:
      model: uniform
      params:
        amplitude: 0.05
    fault:
      model: none
      params: {}

  - id: step_3
    type: step_response
    sampling_rate: 10.0
    signal:
      model: step_response
      params:
        high: 75.0
        low: 15.0
        tau: 2.0
