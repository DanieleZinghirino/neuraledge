sensors:
- fault:
    model: none
    params: {}
  id: temp_1
  noise:
    model: gaussian
    params:
      sigma: 0.05
  sampling_rate: 1
  signal:
    model: temperature
    params:
      base: 24.5
      fast_amp: 0.08
      fast_freq: 0.03
      slow_amp: 1.2
      slow_freq: 0.0008
      tau: 300
  type: temperature
- fault:
    model: scaling
    params:
      activation_prob: 0.005
      scale_factor: 1.03
  id: temp_2
  noise:
    model: drift
    params:
      max_drift: 0.4
      step_sigma: 0.002
  sampling_rate: 2
  signal:
    model: temperature
    params:
      base: 68
      fast_amp: 0.12
      fast_freq: 0.05
      slow_amp: 2.5
      slow_freq: 0.0015
      tau: 120
  type: temperature
- fault:
    model: saturation
    params:
      activation_prob: 0.003
      lower_bound: 0
      upper_bound: 100
  id: temp_3
  noise:
    model: periodic
    params:
      amplitude: 0.04
      frequency: 50
      phase: 0.2
  sampling_rate: 1
  signal:
    model: temperature
    params:
      base: 92
      fast_amp: 0.15
      fast_freq: 0.08
      slow_amp: 1.8
      slow_freq: 0.001
